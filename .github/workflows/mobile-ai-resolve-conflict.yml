name: Mobile AI Resolve Conflict

# Required repository secret:
# - AI_PROVIDER_API_KEY: API key for an OpenAI-compatible chat completions provider.
#
# Optional repository secrets:
# - AI_PROVIDER_BASE_URL: Provider base URL, for example https://api.example.com/v1.
# - AI_PROVIDER_MODEL: Provider model name. Defaults to the script fallback when omitted.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number being resolved.
        required: true
        type: string
      source_branch:
        description: Pull request source branch to update.
        required: true
        type: string
      target_branch:
        description: Pull request target branch to merge into the source branch.
        required: true
        default: main
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: mobile-ai-resolve-conflict-${{ github.repository }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  resolve-conflict:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ inputs.pr_number }}
      SOURCE_BRANCH: ${{ inputs.source_branch }}
      TARGET_BRANCH: ${{ inputs.target_branch }}

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate AI provider configuration
        shell: bash
        env:
          AI_PROVIDER_API_KEY: ${{ secrets.AI_PROVIDER_API_KEY }}
          AI_PROVIDER_BASE_URL: ${{ secrets.AI_PROVIDER_BASE_URL }}
          AI_PROVIDER_MODEL: ${{ secrets.AI_PROVIDER_MODEL }}
        run: |
          if [ -z "${AI_PROVIDER_API_KEY}" ]; then
            echo "::error::AI_PROVIDER_API_KEY repository secret is required."
            exit 1
          fi

          if [ -z "${AI_PROVIDER_BASE_URL}" ]; then
            echo "AI_PROVIDER_BASE_URL is not set; using the OpenAI-compatible default endpoint."
          fi

          if [ -z "${AI_PROVIDER_MODEL}" ]; then
            echo "AI_PROVIDER_MODEL is not set; using the script fallback model."
          fi

      - name: Configure git author
        shell: bash
        run: |
          git config user.name "mobile-ai-coding-agent[bot]"
          git config user.email "mobile-ai-coding-agent[bot]@users.noreply.github.com"

      - name: Validate branches and fetch target
        shell: bash
        run: |
          git check-ref-format --branch "${SOURCE_BRANCH}"
          git check-ref-format --branch "${TARGET_BRANCH}"
          git fetch origin "+refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}"

      - name: Install minimal script dependencies
        shell: bash
        run: |
          # The ai-coding scripts intentionally use Node.js built-ins plus git.
          node --version
          git --version

      - name: Attempt merge target branch
        id: merge
        shell: bash
        run: |
          mkdir -p .ai-coding

          set +e
          git merge --no-ff --no-commit "origin/${TARGET_BRANCH}"
          MERGE_STATUS=$?
          set -e

          if [ "${MERGE_STATUS}" -eq 0 ]; then
            echo "HAS_CONFLICTS=false" >> "${GITHUB_ENV}"
            echo "No conflicts detected."
            exit 0
          fi

          git diff --name-only --diff-filter=U > .ai-coding/conflict-files.txt

          if [ ! -s .ai-coding/conflict-files.txt ]; then
            echo "::error::Merge failed, but no conflicted files were detected."
            exit "${MERGE_STATUS}"
          fi

          echo "HAS_CONFLICTS=true" >> "${GITHUB_ENV}"
          echo "Conflicts detected in $(wc -l < .ai-coding/conflict-files.txt) file(s)."

      - name: Resolve conflicts with AI
        if: env.HAS_CONFLICTS == 'true'
        shell: bash
        env:
          AI_PROVIDER_API_KEY: ${{ secrets.AI_PROVIDER_API_KEY }}
          AI_PROVIDER_BASE_URL: ${{ secrets.AI_PROVIDER_BASE_URL }}
          AI_PROVIDER_MODEL: ${{ secrets.AI_PROVIDER_MODEL }}
        run: node scripts/ai-coding/resolve-conflict.mjs

      - name: Verify conflicts are resolved
        shell: bash
        run: |
          if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
            echo "::error::Unresolved conflicts remain after AI conflict resolution."
            exit 1
          fi

      - name: Install repository dependencies when present
        shell: bash
        run: |
          corepack enable

          if [ -f apps/mobile/pnpm-lock.yaml ]; then
            cd apps/mobile
            pnpm install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          else
            echo "No supported lockfile found; skipping dependency installation."
          fi

      - name: Run checks if available
        shell: bash
        run: |
          run_node_script_if_present() {
            local package_dir="$1"
            local package_manager="$2"
            local script_name="$3"

            if [ ! -f "${package_dir}/package.json" ]; then
              return 0
            fi

            if node -e "const p=require('./${package_dir}/package.json'); process.exit(p.scripts && p.scripts['${script_name}'] ? 0 : 1)"; then
              (
                cd "${package_dir}"
                "${package_manager}" run "${script_name}"
              )
            fi
          }

          if [ -f apps/mobile/pnpm-lock.yaml ]; then
            run_node_script_if_present "apps/mobile" "pnpm" "lint"
            run_node_script_if_present "apps/mobile" "pnpm" "typecheck"
            run_node_script_if_present "apps/mobile" "pnpm" "test"
          elif [ -f package.json ]; then
            if [ -f pnpm-lock.yaml ]; then
              PM="pnpm"
            elif [ -f yarn.lock ]; then
              PM="yarn"
            else
              PM="npm"
            fi

            run_node_script_if_present "." "${PM}" "lint"
            run_node_script_if_present "." "${PM}" "typecheck"
            run_node_script_if_present "." "${PM}" "test"
          else
            echo "No package.json found; skipping checks."
          fi

      - name: Commit conflict resolution
        shell: bash
        run: |
          git add -A -- . ':(exclude).ai-coding'

          if git diff --cached --quiet; then
            echo "No merge or conflict resolution changes to commit."
            exit 0
          fi

          git commit -m "chore: resolve conflicts for PR #${PR_NUMBER}"
          git push origin "HEAD:${SOURCE_BRANCH}"
